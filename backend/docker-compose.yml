version: '3.8'

services:
  # ── Database ─────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: telkantin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: telkantin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./user-service/user.sql:/docker-entrypoint-initdb.d/01-user-schema.sql
      - ./merchant-service/merchant.sql:/docker-entrypoint-initdb.d/02-merchant-schema.sql
      - ./order-service/order.sql:/docker-entrypoint-initdb.d/03-order-schema.sql
      - ./payment-service/payment.sql:/docker-entrypoint-initdb.d/04-payment-schema.sql
    networks:
      - telkantin-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── User & Auth Service ──────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: telkantin-user-service
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      DB_NAME: telkantin
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      BCRYPT_SALT_ROUNDS: 12
      CORS_ORIGIN: "*"
      RATE_LIMIT_MAX: 20
      RATE_LIMIT_WINDOW_MS: 900000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - telkantin-network

  merchant-service:
    build:
      context: ./merchant-service
      dockerfile: Dockerfile
    container_name: telkantin-merchant-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      DB_NAME: telkantin
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - telkantin-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: telkantin-order-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      DB_NAME: telkantin
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      MENU_SERVICE_URL: http://merchant-service:3002
      PAYMENT_SERVICE_URL: http://payment-service:3004
      CORS_ORIGIN: "*"
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW_MS: 900000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - telkantin-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: telkantin-payment-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      DB_NAME: kantin_payment_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - telkantin-network

  # ── Analytics & Report Service (Python/FastAPI) ──────────────────
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: telkantin-analytics-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      DB_NAME: telkantin
      PAYMENT_DB_HOST: mysql
      PAYMENT_DB_PORT: 3306
      PAYMENT_DB_USER: root
      PAYMENT_DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      PAYMENT_DB_NAME: kantin_payment_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - telkantin-network

volumes:
  mysql_data:

networks:
  telkantin-network:
    driver: bridge
