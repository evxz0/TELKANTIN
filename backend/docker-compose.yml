version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: telkantin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: telkantin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./order-service/order.sql:/docker-entrypoint-initdb.d/03-order-schema.sql
      - ./payment-service/payment.sql:/docker-entrypoint-initdb.d/04-payment-schema.sql
    networks:
      - telkantin-network

  postgres:
    image: postgres:15
    container_name: telkantin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: telkantin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./user-service/user.sql:/docker-entrypoint-initdb.d/user.sql
    networks:
      - telkantin-network

  mongodb:
    image: mongo:7
    container_name: telkantin-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - telkantin-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: telkantin-user-service
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: telkantin
    depends_on:
      - postgres
    networks:
      - telkantin-network

  merchant-service:
    build:
      context: ./merchant-service
      dockerfile: Dockerfile
    container_name: telkantin-merchant-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/telkantin
    depends_on:
      - mongodb
    networks:
      - telkantin-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: telkantin-order-service
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: telkantin
    depends_on:
      - mysql
    networks:
      - telkantin-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: telkantin-payment-service
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: kantin_payment_db
    depends_on:
      - mysql
    networks:
      - telkantin-network

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: telkantin-analytics-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: telkantin
      PAYMENT_DB_HOST: mysql
      PAYMENT_DB_PORT: 3306
      PAYMENT_DB_USER: root
      PAYMENT_DB_PASSWORD: rootpassword
      PAYMENT_DB_NAME: kantin_payment_db
    depends_on:
      - mysql
    networks:
      - telkantin-network

  merchant-graphql:
    build:
      context: ./merchant-graphql
      dockerfile: Dockerfile
    container_name: telkantin-merchant-graphql
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      MONGO_URI: mongodb://mongodb:27017/telkantin
    depends_on:
      - mongodb
    networks:
      - telkantin-network

  order-graphql:
    build:
      context: ./order-graphql
      dockerfile: Dockerfile
    container_name: telkantin-order-graphql
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      ORDER_SERVICE_URL: http://order-service:3000
    depends_on:
      - order-service
    networks:
      - telkantin-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: telkantin-api-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      USER_SERVICE_URL: http://user-service:3000
      MERCHANT_SERVICE_URL: http://merchant-service:3002
      ORDER_SERVICE_URL: http://order-service:3000
      PAYMENT_SERVICE_URL: http://payment-service:3000
      ANALYTICS_SERVICE_URL: http://analytics-service:8000
      MERCHANT_GRAPHQL_URL: http://merchant-graphql:4001
      ORDER_GRAPHQL_URL: http://order-graphql:4002
    depends_on:
      - user-service
      - merchant-service
      - order-service
      - payment-service
      - analytics-service
      - merchant-graphql
      - order-graphql
    networks:
      - telkantin-network

volumes:
  mysql_data:
  postgres_data:
  mongo_data:

networks:
  telkantin-network:
    driver: bridge